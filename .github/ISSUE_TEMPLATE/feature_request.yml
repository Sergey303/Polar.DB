name: Feature request
description: Propose an improvement or new capability for Polar.DB
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Good requests describe the user problem first, then the proposed API or behavior.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or design you would like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What have you tried, or what other designs did you consider?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Types / schema model
        - Serialization
        - Sequences / storage
        - Recovery / refresh
        - Indexes / search
        - RecordAccessor / ergonomics
        - Samples / docs
        - Packaging / build
    validations:
      required: true

  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Non-breaking
        - Possibly breaking
        - Not sure
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example usage
      description: Provide sample code, pseudo-code, or expected call patterns
      render: csharp

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues first
          required: true
        - label: This request describes a concrete user or developer problem
          required: true
