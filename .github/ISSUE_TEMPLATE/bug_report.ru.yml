name: Сообщение о баге
description: Сообщить о воспроизводимой ошибке в Polar.DB
title: "[Баг]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение о проблеме.

        По возможности приложите минимальный воспроизводимый пример.
        Для уязвимостей безопасности этот шаблон не используйте — см. SECURITY.md.

  - type: input
    id: version
    attributes:
      label: Версия Polar.DB
      description: Версия пакета, commit SHA или ветка
      placeholder: например 1.0.6 / main / commit SHA
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Target framework
      description: На каком framework работает ваш проект
      placeholder: например net8.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: ОС / окружение
      placeholder: например Windows 11, Ubuntu 24.04, CI runner
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Минимальное воспроизведение
      description: Код, данные и точные шаги
      placeholder: |
        1. Создать схему ...
        2. Добавить элемент ...
        3. Перезагрузить ...
        4. Наблюдать ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Исключение / логи / вывод
      render: text

  - type: dropdown
    id: impact
    attributes:
      label: Влияние
      options:
        - Ошибка сборки или выполнения
        - Неверный результат запроса или индекса
        - Риск порчи данных
        - Проблема recovery или refresh
        - Регрессия производительности
        - Несоответствие документации
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Подтверждение
      options:
        - label: Я сначала поискал похожие issues
          required: true
        - label: Я приложил минимальное воспроизведение или объяснил, почему не могу
          required: true
        - label: Это не сообщение об уязвимости безопасности
          required: true
