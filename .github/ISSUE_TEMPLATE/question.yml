name: Question
description: Ask a usage or API question about Polar.DB
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question.

        Use this template for usage questions, API clarification, limitations, or expected patterns of use.
        For reproducible bugs, please use the bug report template.
        For security issues, do not open a public issue — see SECURITY.md.

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the task or outcome you want to achieve with Polar.DB
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Current approach / code sample
      description: Show the code, schema, or sequence of calls you are using now
      render: csharp
    validations:
      required: true

  - type: textarea
    id: unclear
    attributes:
      label: What is unclear?
      description: Explain what part of the API, behavior, or documentation is confusing
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected usage / expected answer
      description: Describe the answer, behavior, or example you hoped to find
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Target framework
      description: The framework your project is running on
      placeholder: e.g. net8.0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Polar.DB version / branch / commit
      description: Package version, branch name, or commit SHA
      placeholder: e.g. 1.0.6 / main / commit SHA
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I read README, SUPPORT, and relevant docs first
          required: true
        - label: This is not a security report
          required: true
        - label: This is not a feature request disguised as a question
          required: true
