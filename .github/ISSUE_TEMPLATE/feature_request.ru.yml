name: Запрос функциональности
description: Предложить улучшение или новую возможность для Polar.DB
title: "[Фича]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за предложение по улучшению.

        Хороший запрос сначала описывает проблему пользователя, а потом желаемый API или поведение.

  - type: textarea
    id: problem
    attributes:
      label: Описание проблемы
      description: Какую проблему вы пытаетесь решить?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Предлагаемое решение
      description: Опишите желаемый API, поведение или дизайн
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Рассмотренные альтернативы
      description: Что уже пробовали и какие варианты рассматривали?

  - type: dropdown
    id: area
    attributes:
      label: Область
      options:
        - Типы / модель схем
        - Сериализация
        - Последовательности / хранение
        - Recovery / refresh
        - Индексы / поиск
        - RecordAccessor / эргономика
        - Примеры / документация
        - Упаковка / сборка
    validations:
      required: true

  - type: dropdown
    id: compatibility
    attributes:
      label: Влияние на совместимость
      options:
        - Non-breaking
        - Possibly breaking
        - Not sure
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Пример использования
      description: Приложите код, псевдокод или ожидаемые паттерны вызова
      render: csharp

  - type: checkboxes
    id: checks
    attributes:
      label: Подтверждение
      options:
        - label: Я сначала поискал похожие issues
          required: true
        - label: Этот запрос описывает конкретную проблему пользователя или разработчика
          required: true
