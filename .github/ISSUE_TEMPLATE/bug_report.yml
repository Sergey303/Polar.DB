name: Bug report
description: Report a reproducible bug in Polar.DB
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please provide a minimal, reproducible example whenever possible.
        For security issues, do not use this template — see SECURITY.md.

  - type: input
    id: version
    attributes:
      label: Polar.DB version
      description: Package version, commit SHA, or branch
      placeholder: e.g. 1.0.6 / main / commit SHA
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Target framework
      description: The framework your project is running on
      placeholder: e.g. net8.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / environment
      placeholder: e.g. Windows 11, Ubuntu 24.04, CI runner
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code sample, data sample, and exact steps
      placeholder: |
        1. Create schema ...
        2. Append ...
        3. Reload ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Exception / logs / output
      render: text

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Build/runtime failure
        - Wrong query/index result
        - Data corruption risk
        - Recovery/refresh issue
        - Performance regression
        - Documentation mismatch
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues first
          required: true
        - label: I included a minimal reproduction or explained why I cannot
          required: true
        - label: This is not a security vulnerability report
          required: true
