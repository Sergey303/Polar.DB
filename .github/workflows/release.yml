name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pack-release:
    name: Build, pack, and publish
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEYS: ${{ secrets.NUGET_API_KEYS }}
      NUGET_SOURCE: https://api.nuget.org/v3/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Locate solution
        id: locate_solution
        shell: pwsh
        run: |
          $solution = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter *.sln -Recurse |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $solution) {
            throw 'No .sln file was found in the repository.'
          }

          "solution=$solution" >> $env:GITHUB_OUTPUT
          Write-Host "Using solution: $solution"

      - name: Locate Polar.DB project
        id: locate_pack_project
        shell: pwsh
        run: |
          $project = Join-Path $env:GITHUB_WORKSPACE 'src/Polar.DB/Polar.DB.csproj'

          if (-not (Test-Path $project)) {
            throw "Pack project was not found: $project"
          }

          "project=$project" >> $env:GITHUB_OUTPUT
          Write-Host "Using pack project: $project"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Restore
        run: dotnet restore "${{ steps.locate_solution.outputs.solution }}"

      - name: Build
        run: >-
          dotnet build "${{ steps.locate_solution.outputs.solution }}"
          --configuration Release
          --no-restore
          /p:ContinuousIntegrationBuild=true
          /p:Version=${{ steps.version.outputs.version }}
          /warnaserror

      - name: Test
        run: >-
          dotnet test "${{ steps.locate_solution.outputs.solution }}"
          --configuration Release
          --no-build
          --verbosity normal

      - name: Pack Polar.DB only
        run: >-
          dotnet pack "${{ steps.locate_pack_project.outputs.project }}"
          --configuration Release
          --no-build
          --output "${{ github.workspace }}/artifacts/nuget"
          /p:ContinuousIntegrationBuild=true
          /p:Version=${{ steps.version.outputs.version }}

      - name: Upload build artifacts for manual or non-tag runs
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: |
            ${{ github.workspace }}/artifacts/nuget/Polar.DB*.nupkg
            ${{ github.workspace }}/artifacts/nuget/Polar.DB*.snupkg
          if-no-files-found: error

      - name: Normalize NuGet API key
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          raw="${NUGET_API_KEYS-}"

          if [[ -z "$raw" ]]; then
            echo "NUGET_API_KEYS is not configured."
            exit 1
          fi

          echo "::add-mask::$raw"

          sanitized="$(printf '%s' "$raw" | tr -d '\r\n')"
          sanitized="$(printf '%s' "$sanitized" | sed -E 's/^[[:space:]]*key[[:space:]]*[:=][[:space:]]*//I')"
          sanitized="$(printf '%s' "$sanitized" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"

          if [[ -z "$sanitized" ]]; then
            echo "Normalized NuGet API key is empty."
            exit 1
          fi

          echo "::add-mask::$sanitized"

          {
            echo "NUGET_API_KEY_NORMALIZED<<EOF"
            printf '%s\n' "$sanitized"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Publish Polar.DB to NuGet.org
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          shopt -s nullglob
          packages=("${GITHUB_WORKSPACE}"/artifacts/nuget/Polar.DB.*.nupkg)

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No Polar.DB .nupkg file found to publish."
            exit 1
          fi

          if [[ ${#packages[@]} -ne 1 ]]; then
            echo "Expected exactly one Polar.DB .nupkg file, found ${#packages[@]}:"
            printf ' - %s\n' "${packages[@]}"
            exit 1
          fi

          dotnet nuget push "${packages[0]}" \
            --api-key "$NUGET_API_KEY_NORMALIZED" \
            --source "$NUGET_SOURCE" \
            --skip-duplicate

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ github.workspace }}/artifacts/nuget/Polar.DB*.nupkg
            ${{ github.workspace }}/artifacts/nuget/Polar.DB*.snupkg