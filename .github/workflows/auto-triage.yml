name: Auto triage

on:
  issues:
    types:
      - opened
      - reopened
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  issue-triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label to issues when available
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;

            const existing = new Set(
              (context.payload.issue.labels || []).map(label => label.name)
            );

            const repoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 }
            );

            const available = new Set(repoLabels.map(label => label.name));
            const wanted = ['triage'];
            const toAdd = wanted.filter(name => available.has(name) && !existing.has(name));
            const missing = wanted.filter(name => !available.has(name));

            if (missing.length > 0) {
              core.warning(`Repository labels not found: ${missing.join(', ')}`);
            }

            if (toAdd.length === 0) {
              core.info('No labels to add.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: toAdd
            });

  pr-triage:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Add triage and review labels to pull requests when available
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = context.payload.pull_request.number;
            const isDraft = Boolean(context.payload.pull_request.draft);

            const existing = new Set(
              (context.payload.pull_request.labels || []).map(label => label.name)
            );

            const repoLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 }
            );

            const available = new Set(repoLabels.map(label => label.name));
            const wanted = ['triage'];

            if (!isDraft) {
              wanted.push('needs-review');
            }

            const toAdd = wanted.filter(name => available.has(name) && !existing.has(name));
            const missing = wanted.filter(name => !available.has(name));

            if (missing.length > 0) {
              core.warning(`Repository labels not found: ${missing.join(', ')}`);
            }

            if (toAdd.length === 0) {
              core.info('No labels to add.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr_number,
              labels: toAdd
            });
